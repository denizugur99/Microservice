services:

  mongo.db.catalog:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
 

  mongo.db.catalog.ui:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo.db.catalog:27017/
      ME_CONFIG_BASICAUTH: false
 
  

  redis.db.basket:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server","--requirepass","${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redis.db.basket.ui:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: always
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis.db.basket:6379:0:${REDIS_PASSWORD}
      HTTP_USER: ${REDIS_UI_USERNAME}
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD}

  mongo.db.discount:
    image: mongo:latest
    container_name: mongodb-discount
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_discount_data:/data/db

  mongo.db.discount.ui:
    image: mongo-express:latest
    container_name: mongo-express-discount
    restart: always
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo.db.discount:27017/
      ME_CONFIG_BASICAUTH: false

  sqlserver.db.order:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-order
    restart: always
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQLSERVER_PASSWORD}
      MSSQL_PID: Express
    volumes:
      - sqlserver_order_data:/var/opt/mssql

  postgres.db.keycloak:
    image: postgres:16-alpine
    container_name: postgres-keycloak
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data

  keycloak.auth:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: always
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KC_HOSTNAME_PORT: 8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KC_HOSTNAME_STRICT_BACKCHANNEL: false
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres.db.keycloak:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres.db.keycloak
  kafka:
    image: apache/kafka:latest
    container_name: kafka-1
    restart: always
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      #Message retention - 7 days
      KAFKA_LOG_RETENTION_MS: 604800000
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      # Message size limits - 10MB
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_MAX_REQUEST_SIZE: 10485760
      # Auto create topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
  kafka-ui:
    container_name: kafka-ui
    restart: always
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - 8084:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  microservice.basket.api:
    image: microservicebasketapi
    build:
      context: .
      dockerfile: Microservice.Basket.Api/Dockerfile

  microservice.catalog.api:
    image: microservicecatalogapi
    build:
      context: .
      dockerfile: Microservice.Catalog.Api/Dockerfile

  microservice.discount.api:
    image: microservicediscountapi
    build:
      context: .
      dockerfile: Microservice.Discount.API/Dockerfile

  microservice.email:
    image: microserviceemail
    build:
      context: .
      dockerfile: microservice.Email/Dockerfile

  microservice.file.api:
    image: microservicefileapi
    build:
      context: .
      dockerfile: Microservice.File.Api/Dockerfile

  microservice.gateway:
    image: microservicegateway
    build:
      context: .
      dockerfile: Microservice.Gateway/Dockerfile

  microservice.order.api:
    image: microserviceorderapi
    build:
      context: .
      dockerfile: Microservice.Order.Api/Dockerfile

  microservice.payment.api:
    image: microservicepaymentapi
    build:
      context: .
      dockerfile: Microservice.Payment.Api/Dockerfile

  microservicewebapp:
    image: microservicewebapp
    build:
      context: .
      dockerfile: MicroserviceWebApp/Dockerfile

volumes:
  mongodb_data:
  mongodb_discount_data:
  redis_data:
  sqlserver_order_data:
  postgres_keycloak_data:
  kafka_data:










