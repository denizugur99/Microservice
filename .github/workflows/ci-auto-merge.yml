name: CI Build & Auto-Merge

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Microservice.slnx

      - name: Build
        run: dotnet build Microservice.slnx --configuration Release --no-restore
        # No automated test projects exist in this repo yet.
        # Once one is added, add a `dotnet test` step here before auto-merge is allowed to run.

  auto-merge:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash \
            --auto \
            --repo "${{ github.repository }}"

      - name: Wait for merge and trigger CD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN-authored pushes don't trigger other workflows' `push` events,
          # so we explicitly dispatch CD once the merge to master actually lands.
          for i in $(seq 1 30); do
            state=$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --json state --jq .state)
            if [ "$state" = "MERGED" ]; then
              echo "PR merged, triggering CD workflow"
              gh workflow run cd-deploy.yml --repo "${{ github.repository }}" --ref master
              exit 0
            fi
            sleep 5
          done
          echo "PR did not merge within timeout, skipping CD dispatch"
